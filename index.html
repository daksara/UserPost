<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#262624"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="apple-touch-icon" href="/icon-192.svg"/>
    <title>Pendar — Asisten AI Freelance</title>
    <script>
      // Terapkan tema tersimpan sebelum render untuk mencegah flicker (FOUC)
      (function () {
        try {
          var t = localStorage.getItem('userpost-theme');
          // Default dark kecuali user memilih light secara eksplisit
          var theme = t === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', theme === 'light' ? '#faf9f5' : '#262624');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
