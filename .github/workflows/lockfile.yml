name: Generate lockfile
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  lockfile:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: sauna/component-test-harness
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            git add package-lock.json
            git commit -m "chore: regenerate package-lock.json for component test harness"
            git push origin HEAD:sauna/component-test-harness
          else
            echo "lockfile already in sync"
          fi