name: Market Alert Bot

on:
  schedule:
    # Setiap 5 menit. Catatan: cron GitHub Actions bersifat best-effort —
    # saat infra sibuk, run terjadwal bisa molor 1-2 jam. Offset menit
    # (2-57/5, bukan */5) mengurangi skip karena menit kelipatan 5 paling
    # ramai. Kalau butuh kepastian 5 menit, pindahkan ke Cloud Scheduler
    # (functions/src/index.ts sudah punya pollMarketAlerts) atau cron eksternal.
    - cron: '2-57/5 * * * *'
  # Tombol "Run workflow" di GitHub Actions tab untuk test manual
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install bot dependencies
        run: npm install --prefix scripts

      - name: Run bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          BOT_UID: ${{ secrets.BOT_UID }}
          WHALE_THRESHOLD_USD: '1000'
          DEAD_VOLUME_THRESHOLD_USD: '500'
          DEAD_HOURS_REQUIRED: '6'
          MIN_LIQUIDITY_USD: '1000'
          NEW_LISTING_VOL_THRESHOLD_USD: '2000'
          NEW_LISTING_PUMP_PCT: '5'
        run: node scripts/bot-run.mjs
